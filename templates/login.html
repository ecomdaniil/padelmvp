<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Padel CRM</title>
    <style>
        :root {
            color-scheme: light;
        }
        body {
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f6fbff 0%, #eaf4ff 45%, #f7fbff 100%);
            color: #0f172a;
            padding: 20px;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(90deg, rgba(37,99,235,0.06) 1px, transparent 1px), linear-gradient(0deg, rgba(37,99,235,0.06) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.35;
            pointer-events: none;
        }
        .box {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(22px) saturate(140%);
            padding: 36px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 24px 70px rgba(15,23,42,0.12);
            border: 1px solid rgba(37,99,235,0.12);
            position: relative;
            z-index: 1;
        }
        @media (max-width: 420px) {
            .box { padding: 26px 20px; border-radius: 18px; }
        }
        .brand {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #2563eb;
            margin-bottom: 10px;
            display: block;
            text-align: center;
        }
        h1 { font-size: 22px; margin-top: 0; text-align: center; color: #0f172a; }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(37,99,235,0.12);
            box-sizing: border-box;
            font-size: 14px;
            background: #f8fbff;
            color: #0f172a;
            caret-color: #2563eb;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        input::placeholder {
            color: #7c8aa6;
        }
        input:focus {
            outline: none;
            border-color: rgba(37,99,235,0.45);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #0f172a;
            -webkit-box-shadow: 0 0 0px 1000px #f8fbff inset;
            box-shadow: 0 0 0px 1000px #f8fbff inset;
            border-color: rgba(37,99,235,0.35);
            transition: background-color 5000s ease-in-out 0s;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(37,99,235,0.18);
        }
        .flash {
            background: rgba(37,99,235,0.08);
            border: 1px solid rgba(37,99,235,0.12);
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="box">
        <span class="brand">{{ club_brand }}</span>
        <h1>Вход в CRM</h1>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" name="login" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
