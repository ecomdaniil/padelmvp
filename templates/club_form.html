{% extends "base.html" %}
{% block content %}
    <h1>{% if club %}Редактировать клуб{% else %}Новый клуб{% endif %}</h1>
    <form method="post" style="max-width: 500px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 4px; font-weight: 500;">Название *</label>
            <input type="text" name="name" value="{{ club.name if club else '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 4px; font-weight: 500;">Адрес *</label>
            <input type="text" name="address" value="{{ club.address if club else '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 4px; font-weight: 500;">Телефон *</label>
            <input type="text" name="phone" value="{{ club.phone if club else '' }}" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <div style="margin-bottom: 12px;">
            <label style="display: block; margin-bottom: 4px; font-weight: 500;">Описание</label>
            <textarea name="description" rows="3" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">{{ club.description if club else '' }}</textarea>
        </div>
        <div style="margin-top: 16px;">
            <button type="submit" class="btn">Сохранить</button>
            <a href="{{ url_for('clubs_list') }}" class="btn btn-secondary" style="margin-left: 8px;">Отмена</a>
        </div>
    </form>
{% endblock %}
