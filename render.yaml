# Render Blueprint — CRM (web) + опционально отдельный worker для бота.
# На free-плане Background Worker может быть недоступен: тогда бот живёт
# внутри web (RUN_BOT_IN_BACKGROUND=1, см. app.py).
services:
  - type: web
    name: padelmvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --worker-class gthread --threads 2 --timeout 120 --graceful-timeout 30 --max-requests 150 --max-requests-jitter 30 --worker-tmp-dir /dev/shm app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RUN_BOT_IN_BACKGROUND
        value: "1"
      - key: WEBHOOK_ENFORCE_SECRET
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DB_POOL_MIN_SIZE
        value: "1"
      - key: DB_POOL_MAX_SIZE
        value: "4"
      - key: ASYNC_DB_POOL_MIN_SIZE
        value: "1"
      - key: ASYNC_DB_POOL_MAX_SIZE
        value: "3"
