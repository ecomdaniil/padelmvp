version: '3.9'
services:
  web:
    build: .
    # --workers 1: RUN_BOT_IN_BACKGROUND=1 запускает бота потоком внутри
    # этого же процесса (см. app.py:start_background_services). Каждый
    # gunicorn worker — отдельный процесс с собственной памятью, поэтому
    # при >1 воркере получится несколько параллельных ботов (дублирующиеся
    # напоминания по расписанию) и несколько несинхронизированных
    # in-memory кэшей списка игр (см. cache.py) — именно из-за этого CRM
    # могла создать игру в одном воркере, а бот показывал её пользователю
    # из другого воркера со старым кэшем. Если нужно больше 1 воркера для
    # пропускной способности CRM — задайте REDIS_URL (общий кэш/лимиты) и
    # выносите бота в отдельный сервис с RUN_BOT_IN_BACKGROUND=0.
    command: gunicorn --workers 1 --bind 0.0.0.0:8000 app:app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
